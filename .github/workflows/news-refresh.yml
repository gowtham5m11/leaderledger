# Scheduled refresh of public/data/news.json — commit back to repo.
#
# Architecture: Plan A (Firebase Spark plan, no Storage).
#   1. Cron fires; workflow checks out main.
#   2. Scraper reads existing public/data/news.json from the repo, runs
#      its bucket, merges results, writes the file back.
#   3. If news.json actually changed, commit + push to main.
#   4. Firebase Hosting picks up the new news.json on the next deploy
#      (manual `npm run deploy`, OR your Firebase Hosting GitHub
#      integration if you've enabled it).
#
# Frontend reads /data/news.json at runtime — same path in dev (Vite
# serves public/) and prod (Firebase Hosting serves dist/, which Vite
# populates from public/ at build time). No Firebase Storage involved.
#
# Cron */30 means GitHub aims for every 30 minutes; in practice the
# free-tier scheduler often runs 10–30 min late and occasionally skips
# a slot. The 2-hour staleness banner on /news is calibrated for that.
#
# Bucket rotation: each run only refreshes ~1/3 of the 175 candidates
# (bucket = (UTC-hour*2 + UTC-minute/30) % 3). Buckets we don't process
# keep their previous entries verbatim — the scraper merges its new
# bucket into the existing news.json checked out from main.
#
# Expected runtime: ~14 min/bucket (58 candidates × 2 RSS queries × 1.5 s,
# plus per-candidate processing). Comfortably inside the 20-min timeout
# below. This assumes --no-decode. The local Phase B run WITH decode
# took 3h 33m for all 175 — the googlenewsdecoder call to Google adds
# ~2 s/URL × up to 25 URLs/candidate ≈ ~50 s/candidate, which would
# blow past the 20-min timeout for a single bucket.
#
# Commit noise: */30 cron writes a bot commit on every successful run
# where the JSON actually changed (skipped otherwise — see "if news.json
# changed" guard below). That's up to 48 commits/day on main. Each
# commit triggers the Firebase Hosting auto-deploy workflow so the new
# news.json reaches production. If commit noise becomes a problem,
# change the cron to "0 * * * *" (hourly) — refresh interval per
# candidate becomes ~3h, slightly past the 2h staleness banner cutoff.

name: News refresh

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      bucket_override:
        description: "Override bucket (N/3). Leave blank for time-based."
        required: false
        default: ""

# contents: write — the workflow commits + pushes news.json updates.
# actions:  write — the final step dispatches firebase-hosting-merge.yml
#                   via `gh workflow run`. Bot pushes from GITHUB_TOKEN
#                   don't trigger downstream workflows on their own
#                   (anti-loop), but workflow_dispatch IS allowed from
#                   GITHUB_TOKEN per the GitHub Actions docs.
# Default GITHUB_TOKEN permissions are read-only on most repos; we need
# write for both contents and actions here.
permissions:
  contents: write
  actions: write

concurrency:
  group: news-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      LOCAL_PATH: public/data/news.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # token is the default GITHUB_TOKEN; explicit so the later
          # push reuses the same auth.
          token: ${{ secrets.GITHUB_TOKEN }}
          # depth 1 is fine — we don't need history, just the current
          # state of news.json to merge into.
          fetch-depth: 1

      - name: Compute bucket
        id: bucket
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.bucket_override }}" ]; then
            B="${{ github.event.inputs.bucket_override }}"
          else
            H=$(date -u +%H)
            M=$(date -u +%M)
            # epoch_hour*2 + epoch_minute/30, mod 3
            N=$(( (10#$H * 2 + 10#$M / 30) % 3 ))
            B="$N/3"
          fi
          echo "bucket=$B" >> "$GITHUB_OUTPUT"
          echo "Selected bucket: $B"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scraper deps
        run: pip install feedparser requests googlenewsdecoder

      - name: Ensure news.json exists (bootstrap if missing)
        run: |
          set -euo pipefail
          mkdir -p public/data
          if [ ! -f "${LOCAL_PATH}" ]; then
            echo "no prior news.json — bootstrapping empty document"
            echo '{"generated_at":"","by_candidate":{}}' > "${LOCAL_PATH}"
          else
            echo "found existing news.json ($(wc -c < "${LOCAL_PATH}") bytes)"
          fi

      - name: Run news scraper for this bucket
        run: |
          set -euo pipefail
          # --no-decode keeps the run inside the 20-min timeout; URLs stay
          # as news.google.com/rss/articles/... and the browser bounces to
          # the publisher on click. See header comment for rationale.
          python scraper_lab/fetch_news.py \
            --bucket "${{ steps.bucket.outputs.bucket }}" \
            --merge-into "${LOCAL_PATH}" \
            --delay 1.5 \
            --no-decode

      - name: Commit & push if news.json changed
        id: commit
        run: |
          set -euo pipefail
          git config user.name  "leaderledger-news-bot"
          git config user.email "noreply@leaderledger.in"

          # The scraper leaves a .bak_pre_fetch_* file behind; it's
          # gitignored, but be defensive and only stage the target.
          git add "${LOCAL_PATH}"

          if git diff --cached --quiet; then
            echo "news.json unchanged — skipping commit (bucket produced no diff)"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUCKET="${{ steps.bucket.outputs.bucket }}"
          # jq is pre-installed on ubuntu-latest. Defensive `// 0` so the
          # commit doesn't error if the bucket somehow produced an empty
          # by_candidate object.
          N_CAND=$(jq '.by_candidate | length' "${LOCAL_PATH}")
          N_ITEMS=$(jq '[.by_candidate[]? | length] | add // 0' "${LOCAL_PATH}")

          # The bot push from GITHUB_TOKEN won't auto-trigger downstream
          # workflows (anti-loop), so the next step dispatches
          # firebase-hosting-merge.yml explicitly via workflow_dispatch
          # (one of the two trigger types GITHUB_TOKEN is allowed to fire).
          git commit -m "news: refresh bucket ${BUCKET} (${N_CAND} candidates, ${N_ITEMS} items)"
          git push origin HEAD:main
          echo "pushed news.json update for bucket ${BUCKET}"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Firebase Hosting deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run firebase-hosting-merge.yml --ref main
          echo "Dispatched firebase-hosting-merge.yml on main"
